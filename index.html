<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Solitaire — Nyangi Games</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="shared.css">
    <style>
        body { text-align: center; }
        h1 { font-size: 2rem; margin: 0 0 8px; }
        .logo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
            margin: 0 auto 16px;
            border-radius: 26px;
        }
        .tagline { font-size: 1rem; color: #8a5040; margin: 0 0 48px; }
        .store-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 56px;
        }
        .store-link img { height: 48px; display: block; opacity: 1; transition: opacity 0.15s; }
        .store-link:hover img { opacity: 0.8; }
    </style>
    <script src="components.js" defer></script>
</head>
<body>
    <img class="logo" src="AppLogo.png" alt="Cat Solitaire">
    <h1>Cat Solitaire</h1>
    <p class="tagline">Classic Klondike Solitaire with a cozy cat twist.</p>

    <div class="store-links">
        <a class="store-link" href="https://apps.apple.com/app/cat-solitaire-cozy-cards/id6760235561" target="_blank" rel="noopener">
            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us" alt="Download on the App Store">
        </a>
        <a class="store-link" href="https://play.google.com/store/apps/details?id=io.nyangi.solitaire" target="_blank" rel="noopener">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" style="height: 72px; margin: -12px;">
        </a>
    </div>
</body>
</html>
